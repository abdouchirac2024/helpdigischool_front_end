# ============================================
# Help Digi School - Docker Compose Development
# ============================================
# Usage: make up-dev
# ============================================

services:
  frontend:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
    container_name: helpdigischool-frontend-dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${DEBUG_PORT:-9229}:9229"
    volumes:
      - ../..:/app:cached
      - /app/node_modules
      - nextjs-cache:/app/.next
    environment:
      # L'API pointe desormais sur Traefik (car plusieurs instances backend)
      - NEXT_PUBLIC_API_URL=http://api.helpdigischool.localhost/api
      # URL interne Docker pour le proxy serveur Next.js (load balancing entre les 3 instances)
      - BACKEND_URL=http://backend:8080
    env_file:
      - ../../.env.local
    extra_hosts:
      # Requis pour Linux (host.docker.internal n'est pas natif sur Linux)
      - "host.docker.internal:host-gateway"
    healthcheck:
      start_period: 60s
    networks:
      - default
      - traefik
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.helpdigischool-dev.rule=Host(`helpdigischool.localhost`)"
      - "traefik.http.routers.helpdigischool-dev.entrypoints=web"
      - "traefik.http.services.helpdigischool-dev.loadbalancer.server.port=3000"

networks:
  default:
    name: helpdigischool-network-dev
  traefik:
    external: true
    name: traefik-dev
  backend:
    external: true
    name: digischool-backend-network

volumes:
  nextjs-cache:
